api_version: v1
kind: agent
name: credential-proxy-claude

# Validates the M0 credential-injection proxy with the real Claude Code client —
# exercising the RFC-0002 V1 facts (redirect, CA trust + name constraints,
# force-login suppression). The host holds ANTHROPIC_API_KEY; the proxy injects it at egress,
# so the guest carries only a placeholder plus the per-sandbox CA + proxy token.
#
# Run (Linux/KVM):
#   scripts/build_claude_rootfs.sh
#   export VOID_BOX_KERNEL=/boot/vmlinuz-$(uname -r)
#   export VOID_BOX_INITRAMFS=$PWD/target/void-box-claude.cpio.gz
#   export ANTHROPIC_API_KEY=sk-ant-...
#   cargo run --bin voidbox -- run --file examples/specs/credential_proxy_claude.yaml
#
# Pass criteria: the agent reaches the Anthropic API and answers; the run log
# shows "credential proxy active on port N for api.anthropic.com (real key
# withheld from guest)"; no force-login or retry storm.

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true

llm:
  provider: claude
  credential_proxy: true

agent:
  prompt: "Say hello in one sentence and confirm you reached the Anthropic API."
  skills:
    - "agent:claude-code"
  timeout_secs: 120
