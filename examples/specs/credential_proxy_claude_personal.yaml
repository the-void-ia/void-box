api_version: v1
kind: agent
name: credential-proxy-claude-personal

# Validates the M1a credential-injection proxy on the *personal OAuth* path with
# the real Claude Code client. The host holds the OAuth credential (from
# `claude auth login`); the host credential store refreshes it and mints a
# short-lived Bearer that the proxy injects at egress. The guest carries only a
# placeholder ANTHROPIC_AUTH_TOKEN plus the per-sandbox CA + proxy token, and
# CLAUDE_CODE_PROVIDER_MANAGED_BY_HOST=1 — the durable refresh token never enters
# the guest (unlike the old mount path, which staged .credentials.json).
#
# Prerequisites: run `claude auth login` on the host first. Uses a personal
# Claude Pro/Max subscription — single-tenant, opt-in, user-owned (RFC-0002 trust
# model). Before relying on this, run the V2 acceptance harness against a
# throwaway account (see tests/oauth_real_upstream.rs).
#
# Run (Linux/KVM — M1a is Linux-only; VZ/macOS is M1b):
#   scripts/build_claude_rootfs.sh
#   export VOID_BOX_KERNEL=/boot/vmlinuz-$(uname -r)
#   export VOID_BOX_INITRAMFS=$PWD/target/void-box-claude.cpio.gz
#   claude auth login   # if not already logged in
#   cargo run --bin voidbox -- run --file examples/specs/credential_proxy_claude_personal.yaml
#
# Pass criteria: the agent reaches the Anthropic API and answers; the run log
# shows "credential proxy active on port N for api.anthropic.com (real key
# withheld from guest)"; no force-login or retry storm; no .credentials.json is
# staged into the guest.

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true

llm:
  provider: claude-personal
  credential_proxy: true

agent:
  prompt: "Say hello in one sentence and confirm you reached the Anthropic API."
  skills:
    - "agent:claude-code"
  timeout_secs: 120
