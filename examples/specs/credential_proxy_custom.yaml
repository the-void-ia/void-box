api_version: v1
kind: agent
name: credential-proxy-custom

# Validates the M1b credential-injection proxy on the Anthropic-compatible
# *Custom* provider path. The host holds the endpoint's API key (read from the
# env var named by api_key_env); the proxy injects it as `x-api-key` at egress.
# The guest's redirected ANTHROPIC_BASE_URL preserves the endpoint's base path
# (here `/api/v1`), and the proxy re-originates to the endpoint's real host and
# port.
#
# Constraints: the base_url must be https (the proxy injects at TLS egress) and
# must resolve to a public address — the proxy's SSRF guard refuses internal
# ranges, so a host-local gateway (e.g. 10.0.2.2) cannot use credential_proxy
# (it does not need it: local gateways take no durable secret).
#
# Run:
#   scripts/build_claude_rootfs.sh
#   export VOID_BOX_KERNEL=/boot/vmlinuz-$(uname -r)          # Linux
#   export VOID_BOX_INITRAMFS=$PWD/target/void-box-claude.cpio.gz
#   export OPENROUTER_API_KEY=sk-or-...
#   cargo run --bin voidbox -- run --file examples/specs/credential_proxy_custom.yaml
#
# Pass criteria: the agent reaches the custom endpoint and answers; the run log
# shows "credential proxy active on port N for openrouter.ai (real key withheld
# from guest)".

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true

llm:
  provider: custom
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: OPENROUTER_API_KEY
  model: "anthropic/claude-sonnet-4.5"
  credential_proxy: true

agent:
  prompt: "Say hello in one sentence and confirm which endpoint you reached."
  skills:
    - "agent:claude-code"
  timeout_secs: 120
