# Snapshot Pipeline Example
#
# Works in two modes:
#   1. With snapshot (fast restore) — set `sandbox.snapshot` to a hash or path
#   2. Without snapshot (cold boot) — just omit the snapshot line
#
# The snapshot path can be:
#   - A hash prefix (e.g. "60e3c527") → ~/.void-box/snapshots/<prefix>/
#   - A literal directory path containing state.bin + memory.mem
#   - Omitted → normal cold boot
#
# To create snapshots (optional, for faster restores):
#   cargo run --example snapshot_restore
#
# Run:
#   VOID_BOX_KERNEL=/boot/vmlinuz-$(uname -r) \
#   cargo run --bin voidbox -- run --file examples/specs/snapshot_pipeline.yaml

api_version: v1
kind: pipeline
name: snapshot-pipeline

sandbox:
  mode: auto
  memory_mb: 2048
  vcpus: 4
  network: true
  # Uncomment to restore from a snapshot instead of cold-booting:
  # snapshot: "4add3d695dbd609b"

llm:
  provider: claude

pipeline:
  boxes:
    - name: analyzer
      prompt: "List 3 key benefits of VM snapshot/restore for agent workloads."
      skills:
        - "agent:claude-code"
      timeout_secs: 120
      # Per-box snapshot override — this box restores from a snapshot.
      # sandbox:
      #   snapshot: "60e3c527"

    - name: summarizer
      prompt: "Summarize the input into one paragraph."
      skills:
        - "agent:claude-code"
      timeout_secs: 120
      # This box cold-boots (no snapshot override).

  stages:
    - type: box
      name: analyzer
    - type: box
      name: summarizer
