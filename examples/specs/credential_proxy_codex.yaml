api_version: v1
kind: agent
name: credential-proxy-codex

# Validates the M1b credential-injection proxy on the codex *API-key* path with
# the real codex CLI. The host holds the OpenAI API key (from
# `codex login --api-key` or OPENAI_API_KEY); the proxy injects it as
# `Authorization: Bearer` at egress. The guest carries only a generated
# config.toml (a dedicated `voidbox` provider entry redirecting codex at the
# proxy, WebSockets forced off) and a placeholder auth.json whose "key" is the
# token-bearing placeholder — the real key never enters the guest.
#
# Run:
#   scripts/build_codex_rootfs.sh
#   export VOID_BOX_KERNEL=/boot/vmlinuz-$(uname -r)          # Linux
#   export VOID_BOX_INITRAMFS=$PWD/target/void-box-codex.cpio.gz
#   export OPENAI_API_KEY=sk-...                              # or `codex login --api-key`
#   cargo run --bin voidbox -- run --file examples/specs/credential_proxy_codex.yaml
#
# Pass criteria: the agent reaches the OpenAI API and answers; the run log shows
# "credential proxy active on port N for api.openai.com (real key withheld from
# guest)"; no WebSocket-upgrade 502 in the proxy log (config forces plain HTTPS);
# no force-login or retry storm.

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true

llm:
  provider: codex
  credential_proxy: true

agent:
  prompt: "Say hello in one sentence and confirm you reached the OpenAI API."
  timeout_secs: 120
