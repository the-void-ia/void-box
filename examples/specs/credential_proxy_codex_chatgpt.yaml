api_version: v1
kind: agent
name: credential-proxy-codex-chatgpt

# Validates the M1b credential-injection proxy on the codex *ChatGPT OAuth* path
# with the real codex CLI. The host holds the ChatGPT credential (from
# `codex login`); the host credential store refreshes it and mints a short-lived
# Bearer that the proxy injects at egress, alongside the host-held
# chatgpt-account-id. The guest carries only a generated config.toml plus a
# placeholder auth.json (dummy far-future JWTs) — the durable refresh token
# never enters the guest (unlike the old mount path, which staged auth.json RW).
#
# Prerequisites: run `codex login` on the host first. Uses a personal ChatGPT
# subscription — single-tenant, opt-in, user-owned (RFC-0002 trust model).
# Before relying on this, run the V2 acceptance harness against a throwaway
# account (see tests/codex_oauth_real_upstream.rs) — it spends a single-use
# refresh token, so never point it at your primary login.
#
# Run:
#   scripts/build_codex_rootfs.sh
#   export VOID_BOX_KERNEL=/boot/vmlinuz-$(uname -r)          # Linux
#   export VOID_BOX_INITRAMFS=$PWD/target/void-box-codex.cpio.gz
#   codex login   # if not already logged in
#   cargo run --bin voidbox -- run --file examples/specs/credential_proxy_codex_chatgpt.yaml
#
# Pass criteria: the agent reaches the ChatGPT backend and answers; the run log
# shows "credential proxy active on port N for chatgpt.com (real key withheld
# from guest)"; no auth.json is mounted into the guest; no WebSocket-upgrade 502
# in the proxy log; no force-login or retry storm.

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true

llm:
  provider: codex
  credential_proxy: true

agent:
  prompt: "Say hello in one sentence and confirm you reached the OpenAI backend."
  timeout_secs: 120
