name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: E2E KVM (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            runner: ubuntu-latest
            musl-target: x86_64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      # ---- KVM setup ----
      - name: Enable KVM access
        run: |
          # Make /dev/kvm and /dev/vhost-vsock accessible to the runner user.
          # Without chmod on /dev/vhost-vsock the vsock-preflight silently
          # skips every KVM e2e test — masking real failures.
          sudo chmod a+rw /dev/kvm
          sudo modprobe vhost_vsock || true
          sudo chmod a+rw /dev/vhost-vsock 2>/dev/null || true
          ls -la /dev/kvm
          ls -la /dev/vhost-vsock 2>/dev/null || echo "/dev/vhost-vsock not present (may be built-in)"

      # ---- System dependencies ----
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          # busybox-static is REQUIRED — `scripts/build_test_image.sh`
          # silently builds an initramfs with no `/bin/sh` when BUSYBOX
          # is unset (see `scripts/lib/guest_common.sh::install_busybox`).
          # Guests without `/bin/sh`+`ip` fail in two ways:
          #   - `Command::new("ip")` from guest-agent's setup_network()
          #     hangs PID 1 (see AGENTS.md "Known issues" — vsock
          #     control-channel timeout) → persistent_channel handshake
          #     deadline.
          #   - `vm.exec("echo", …)` returns ENOENT in the guest agent
          #     → snapshot suite asserts fail, pty `sh -c "exit 42"`
          #     hits the execvp(127) child path.
          # All three failures share this single missing dep.
          sudo apt-get install -y -qq cpio gzip zstd musl-tools busybox-static
          # Ensure kernel modules are available for the running kernel
          sudo apt-get install -y -qq linux-modules-$(uname -r) || true
          # `scripts/lib/agent_rootfs_common.sh::setup_busybox` defaults
          # BUSYBOX to /usr/bin/busybox; Ubuntu's busybox-static lands
          # the multi-call binary at /bin/busybox. Symlink so the
          # default lookup succeeds without env-var plumbing.
          [ -e /usr/bin/busybox ] || sudo ln -sf /bin/busybox /usr/bin/busybox

      # ---- Rust toolchain ----
      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.musl-target }}

      # ---- Cargo cache ----
      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2e-${{ matrix.musl-target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-${{ matrix.musl-target }}-

      # ---- Build test initramfs ----
      - name: Build test initramfs (guest-agent + claudio)
        # `install_busybox` (scripts/lib/guest_common.sh) requires the
        # BUSYBOX env var to be set — file existence alone is not
        # enough. Without this the build silently produces an
        # initramfs with no `/bin/sh`, see commit 004190b.
        env:
          BUSYBOX: /usr/bin/busybox
        run: scripts/build_test_image.sh

      # ---- Unit + integration tests ----
      - name: Run unit tests
        run: cargo test --workspace --all-features --verbose

      # ---- E2E KVM tests ----
      - name: Run E2E KVM tests
        env:
          VOID_BOX_KERNEL: /boot/vmlinuz-${{ env.KERNEL_VERSION }}
          VOID_BOX_INITRAMFS: /tmp/void-box-test-rootfs.cpio.gz
        run: |
          if [ ! -e /dev/vhost-vsock ]; then
            echo "Skipping e2e: /dev/vhost-vsock is not available on this runner."
            exit 0
          fi

          # Detect kernel version at runtime (env context can't run commands)
          KERNEL_SRC="/boot/vmlinuz-$(uname -r)"
          KERNEL_COPY="/tmp/void-box-kernel-$(uname -r)"
          sudo cp "$KERNEL_SRC" "$KERNEL_COPY"
          sudo chown "$USER:$USER" "$KERNEL_COPY"
          chmod 644 "$KERNEL_COPY"
          export VOID_BOX_KERNEL="$KERNEL_COPY"
          echo "Kernel: $VOID_BOX_KERNEL"
          echo "Initramfs: $VOID_BOX_INITRAMFS"

          # Verify artifacts exist
          ls -la "$VOID_BOX_KERNEL"
          ls -la "$VOID_BOX_INITRAMFS"

          # Run E2E tests (--ignored to include KVM tests, sequential to avoid resource contention)
          cargo test --test e2e_telemetry -- --ignored --test-threads=1

          # Run mount integration tests
          cargo test --test e2e_mount -- --ignored --test-threads=1

          # Persistent multiplex channel under concurrent + serial RPC load.
          cargo test --test persistent_channel -- --ignored --test-threads=1

          # Skill-install + MCP exec path (exercises unified ControlChannel)
          cargo test --test e2e_skill_pipeline -- --ignored --test-threads=1

          # PTY exit-code propagation.
          cargo test --test e2e_pty pty_nonzero_exit_code \
            -- --ignored --test-threads=1

      - name: Run snapshot integration tests
        env:
          VOID_BOX_KERNEL: /boot/vmlinuz-${{ env.KERNEL_VERSION }}
          VOID_BOX_INITRAMFS: /tmp/void-box-test-rootfs.cpio.gz
        run: |
          KERNEL_COPY="/tmp/void-box-kernel-$(uname -r)"
          if [ -f "$KERNEL_COPY" ]; then
            export VOID_BOX_KERNEL="$KERNEL_COPY"
          fi
          cargo test --test snapshot_integration -- --ignored --test-threads=1
