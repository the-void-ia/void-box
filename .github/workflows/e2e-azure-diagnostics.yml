name: E2E Azure Diagnostics

# Manual diagnostic workflow for the three CI-only failures disabled by the
# `persistent_channel` / `pty_nonzero_exit_code` / `snapshot_integration`
# comments in `e2e.yml`. Re-runs the disabled tests on the same Azure
# `ubuntu-latest` host they fail on, with extra instrumentation:
#
#   - VOID_BOX_DIAGNOSTIC=1 (panics with full context instead of swallowing
#     VM-init / exec errors via early-return; routes persistent_channel guest
#     serial console to a file)
#   - RUST_LOG=void_box=trace,debug to capture connect_with_handshake_sync
#     debug output from `src/backend/control_channel.rs`
#   - cargo test ... -- --nocapture so eprintlns from the tests reach the log
#   - guest-agent kmsg of execvp errno (PR diff to guest-agent/src/pty.rs)
#
# All produced logs are uploaded as workflow artifacts. The workflow is
# `workflow_dispatch` only; it must never run on push so it cannot regress
# main green.
#
# Tracked alongside the umbrella "E2E: Azure runner KVM flakiness" issue
# referenced in `.github/workflows/e2e.yml` comments.

on:
  workflow_dispatch:
    inputs:
      tests:
        description: "Which suites to run (comma-separated: persistent_channel, pty, snapshot, all)"
        required: false
        default: "all"
        type: string
  # `workflow_dispatch` cannot fire from a non-default branch until the
  # workflow file lands on `main`, so during the active CI investigation
  # we also trigger on push to this specific diagnostic branch. This
  # `push` trigger is intended to be removed once the workflow is in
  # `main` and `workflow_dispatch` works for the team.
  push:
    branches:
      - "diag/azure-ci-flakiness"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  # `void_box=trace` exposes `connect_with_handshake_sync` debug logs and
  # multiplex reader-thread state; `debug` for everything else keeps noise
  # bounded.
  RUST_LOG: void_box=trace,debug
  VOID_BOX_DIAGNOSTIC: "1"
  # `inputs.tests` is null on `push` events (input defaults only apply to
  # `workflow_dispatch`), so capture an effective value here and use it in
  # every step `if:` below.
  TESTS_FILTER: ${{ inputs.tests || 'all' }}

jobs:
  diagnostics:
    name: E2E Azure Diagnostics (Ubuntu x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM access
        run: |
          sudo chmod a+rw /dev/kvm
          sudo modprobe vhost_vsock || true
          sudo chmod a+rw /dev/vhost-vsock 2>/dev/null || true
          ls -la /dev/kvm
          ls -la /dev/vhost-vsock 2>/dev/null || echo "/dev/vhost-vsock not present"

      - name: Capture host environment
        run: |
          set -x
          uname -a
          nproc
          free -h
          cat /proc/cpuinfo | head -40 || true
          # Hyper-V exposes host hypervisor through cpuinfo flags; useful to
          # confirm we are L2 nested under Azure.
          grep -E "^(model name|flags|hypervisor)" /proc/cpuinfo | sort -u

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          # busybox-static: see e2e.yml for the full rationale. Without
          # it the test initramfs ships without `/bin/sh`+`ip`, which is
          # the actual root cause of the "Azure-only flakiness" the
          # disabled tests were chasing.
          sudo apt-get install -y -qq cpio gzip zstd musl-tools busybox-static
          sudo apt-get install -y -qq linux-modules-$(uname -r) || true
          [ -e /usr/bin/busybox ] || sudo ln -sf /bin/busybox /usr/bin/busybox

      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Distinct cache key from `e2e.yml` so the diagnostic build does not
          # poison the green-path cache.
          key: ${{ runner.os }}-e2e-azure-diag-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-azure-diag-

      - name: Build test initramfs (guest-agent + claudio)
        # `install_busybox` (scripts/lib/guest_common.sh) requires
        # `BUSYBOX` to be exported — see e2e.yml for the full rationale.
        env:
          BUSYBOX: /usr/bin/busybox
        run: scripts/build_test_image.sh

      - name: Stage kernel and initramfs
        run: |
          KERNEL_SRC="/boot/vmlinuz-$(uname -r)"
          KERNEL_COPY="/tmp/void-box-kernel-$(uname -r)"
          sudo cp "$KERNEL_SRC" "$KERNEL_COPY"
          sudo chown "$USER:$USER" "$KERNEL_COPY"
          chmod 644 "$KERNEL_COPY"
          ls -la "$KERNEL_COPY"
          ls -la /tmp/void-box-test-rootfs.cpio.gz
          {
            echo "VOID_BOX_KERNEL=$KERNEL_COPY"
            echo "VOID_BOX_INITRAMFS=/tmp/void-box-test-rootfs.cpio.gz"
            echo "VOID_BOX_DIAGNOSTIC_CONSOLE_PATH=/tmp/void-box-persistent-channel-console.log"
          } >> "$GITHUB_ENV"

      - name: Run persistent_channel
        if: ${{ env.TESTS_FILTER == 'all' || contains(env.TESTS_FILTER, 'persistent_channel') }}
        # Diagnostic-only: the suite is expected to fail on Azure. We surface
        # the failure as a job warning and continue so subsequent suites also
        # run and produce their own artifacts.
        continue-on-error: true
        run: |
          if [ ! -e /dev/vhost-vsock ]; then
            echo "::warning::/dev/vhost-vsock not available; skipping persistent_channel"
            exit 0
          fi
          set -x
          cargo test --test persistent_channel -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee /tmp/persistent_channel-test.log

      - name: Run pty_nonzero_exit_code
        if: ${{ env.TESTS_FILTER == 'all' || contains(env.TESTS_FILTER, 'pty') }}
        continue-on-error: true
        run: |
          if [ ! -e /dev/vhost-vsock ]; then
            echo "::warning::/dev/vhost-vsock not available; skipping pty_nonzero_exit_code"
            exit 0
          fi
          set -x
          cargo test --test e2e_pty pty_nonzero_exit_code \
            -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee /tmp/pty-test.log

      - name: Run snapshot_integration (failing subset)
        if: ${{ env.TESTS_FILTER == 'all' || contains(env.TESTS_FILTER, 'snapshot') }}
        continue-on-error: true
        # Stick to the four tests the disable-commit explicitly listed plus
        # `snapshot_cold_boot_vs_restore` (the one that hung last time). Any
        # later snapshot test that hangs is contained by the 50-minute step
        # timeout and the 60-minute job timeout — the suite is sequential,
        # so a hang on test N never blocks tests 1..N-1 from logging.
        timeout-minutes: 50
        run: |
          if [ ! -e /dev/vhost-vsock ]; then
            echo "::warning::/dev/vhost-vsock not available; skipping snapshot tests"
            exit 0
          fi
          set -x
          cargo test --test snapshot_integration -- --ignored --nocapture --test-threads=1 \
            auto_snapshot_round_trip \
            snapshot_cli_create_and_list \
            snapshot_cli_create_diff \
            snapshot_cli_delete \
            snapshot_cold_boot_vs_restore \
            2>&1 | tee /tmp/snapshot-test.log

      - name: Collect diagnostic logs
        if: always()
        run: |
          set -x
          mkdir -p /tmp/diagnostics-out
          # Test stdout/stderr captured via tee above
          cp /tmp/persistent_channel-test.log /tmp/diagnostics-out/ 2>/dev/null || true
          cp /tmp/pty-test.log /tmp/diagnostics-out/ 2>/dev/null || true
          cp /tmp/snapshot-test.log /tmp/diagnostics-out/ 2>/dev/null || true
          # Guest serial console for persistent_channel
          cp /tmp/void-box-persistent-channel-console.log /tmp/diagnostics-out/ 2>/dev/null || true
          # Host dmesg slice — captures host kernel reaction to the L2 KVM
          # boots (vhost-vsock ECONNRESETs land here when the L2 guest is
          # silently dying)
          sudo dmesg --since '-30 minutes' > /tmp/diagnostics-out/host-dmesg.log 2>/dev/null || true
          ls -la /tmp/diagnostics-out

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-azure-diagnostics-${{ github.run_id }}
          path: /tmp/diagnostics-out
          retention-days: 14
