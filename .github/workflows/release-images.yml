name: Release Images

# Build flavor-specific initramfs artifacts and kernels for auto image
# resolution. Attaches all artifacts + SHA-256 checksums to the GitHub Release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build images for (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write  # Attach assets to release

# Agent versions + SHA-256s are pinned in scripts/agents/manifest.toml
# (R-B5c.1). The build scripts read the manifest as the single source of
# truth; do not re-export CLAUDE_CODE_VERSION / CODEX_VERSION here.

jobs:
  build-images:
    name: Build Images (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-unknown-linux-musl

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools cpio gzip xz-utils zstd file \
            flex bison bc libssl-dev libelf-dev

      - name: Install aarch64 cross-linker
        if: matrix.arch == 'aarch64' && runner.arch == 'X64'
        run: |
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
          echo 'CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
          echo 'CFLAGS_aarch64_unknown_linux_musl=-U_FORTIFY_SOURCE' >> "$GITHUB_ENV"

      - name: Download static busybox
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              DEB_URL="https://launchpad.net/ubuntu/+archive/primary/+files/busybox-static_1.36.1-6ubuntu3.1_amd64.deb"
              ;;
            aarch64)
              DEB_URL="https://launchpad.net/ubuntu/+archive/primary/+files/busybox-static_1.36.1-6ubuntu3.1_arm64.deb"
              ;;
          esac
          curl -fsSL --retry 3 --retry-delay 5 "$DEB_URL" -o /tmp/busybox-static.deb
          cd /tmp && ar x busybox-static.deb && tar xf data.tar* ./usr/bin/busybox
          chmod +x /tmp/usr/bin/busybox
          echo "BUSYBOX=/tmp/usr/bin/busybox" >> "$GITHUB_ENV"

      - name: Build base image
        run: |
          export ARCH=${{ matrix.arch }}
          export OUT_CPIO=$PWD/target/void-box-base-${{ matrix.arch }}.cpio.gz
          export VOID_BOX_PINNED_KMODS=1
          scripts/build_guest_image.sh

      - name: Build claude image
        run: |
          export ARCH=${{ matrix.arch }}
          export OUT_CPIO=$PWD/target/void-box-claude-${{ matrix.arch }}.cpio.gz
          export VOID_BOX_PINNED_KMODS=1
          scripts/build_claude_rootfs.sh

      - name: Build codex image
        run: |
          export ARCH=${{ matrix.arch }}
          export OUT_CPIO=$PWD/target/void-box-codex-${{ matrix.arch }}.cpio.gz
          export VOID_BOX_PINNED_KMODS=1
          scripts/build_codex_rootfs.sh

      - name: Build agents image
        run: |
          export ARCH=${{ matrix.arch }}
          export OUT_CPIO=$PWD/target/void-box-agents-${{ matrix.arch }}.cpio.gz
          export VOID_BOX_PINNED_KMODS=1
          scripts/build_agents_rootfs.sh

      - name: Download kernel
        run: |
          export ARCH=${{ matrix.arch }}
          scripts/download_kernel.sh
          # Rename to spec-expected names. download_kernel.sh on Linux
          # produces a compressed vmlinuz for both archs; for aarch64 we
          # additionally extract an uncompressed vmlinux so macOS/VZ
          # consumers of this release asset can boot it.
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            cp target/vmlinuz-amd64 target/vmlinuz-x86_64
          else
            chmod +x scripts/extract-vmlinux
            scripts/extract-vmlinux target/vmlinuz-arm64 > target/vmlinux-aarch64
            test -s target/vmlinux-aarch64
          fi

      - name: Cache slim kernel source + Firecracker config
        uses: actions/cache@v4
        with:
          path: |
            target/linux-6.12.30
            target/linux-6.12.30.tar.xz
            target/microvm-kernel-6.1-*.config
          key: slim-kernel-src-v6.12.30-fc-v1.10.1-${{ matrix.arch }}
          restore-keys: |
            slim-kernel-src-v6.12.30-fc-v1.10.1-

      - name: Build slim kernel (uncompressed vmlinux)
        run: |
          export ARCH=${{ matrix.arch }}
          # Free disk before a kernel build (source + build tree ~ 4-5 GB)
          df -h / | tail -1
          scripts/build_slim_kernel.sh
          test -s target/vmlinux-slim-${{ matrix.arch }}

      - name: Generate SHA-256 checksums
        run: |
          cd target
          for f in \
            void-box-base-${{ matrix.arch }}.cpio.gz \
            void-box-claude-${{ matrix.arch }}.cpio.gz \
            void-box-codex-${{ matrix.arch }}.cpio.gz \
            void-box-agents-${{ matrix.arch }}.cpio.gz; do
            sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
          done
          # Distro kernel (name varies by arch) + slim kernel
          for f in $(ls \
            vmlinuz-${{ matrix.arch }} \
            vmlinux-${{ matrix.arch }} \
            vmlinux-slim-${{ matrix.arch }} \
            2>/dev/null); do
            sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
          done

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          cd target
          # Upload all image artifacts and their checksums
          for f in \
            void-box-base-${{ matrix.arch }}.cpio.gz \
            void-box-claude-${{ matrix.arch }}.cpio.gz \
            void-box-codex-${{ matrix.arch }}.cpio.gz \
            void-box-agents-${{ matrix.arch }}.cpio.gz \
            void-box-base-${{ matrix.arch }}.cpio.gz.sha256 \
            void-box-claude-${{ matrix.arch }}.cpio.gz.sha256 \
            void-box-codex-${{ matrix.arch }}.cpio.gz.sha256 \
            void-box-agents-${{ matrix.arch }}.cpio.gz.sha256; do
            gh release upload "$TAG" "$f" --clobber
          done
          # Upload kernels + checksums (distro + slim)
          for f in $(ls \
            vmlinuz-${{ matrix.arch }} vmlinuz-${{ matrix.arch }}.sha256 \
            vmlinux-${{ matrix.arch }} vmlinux-${{ matrix.arch }}.sha256 \
            vmlinux-slim-${{ matrix.arch }} vmlinux-slim-${{ matrix.arch }}.sha256 \
            2>/dev/null); do
            gh release upload "$TAG" "$f" --clobber
          done

  # R-B5c.1: publish the pinned vendored-agent hashes as release metadata so a
  # downstream consumer of a given release has the version+hash record without
  # cloning the repo. Matches R-B5b.1's pattern (same RELEASE_DIGESTS.json).
  publish-release-digests:
    name: Publish RELEASE_DIGESTS.json
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Build RELEASE_DIGESTS.json from manifest.toml
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, pathlib, sys, tomllib
          # Use tomllib (Python 3.11+ stdlib) rather than a regex scan so a
          # malformed manifest fails this job loudly instead of silently
          # producing a partial RELEASE_DIGESTS.json. ubuntu-latest ships
          # python3.12 which has tomllib built in.
          manifest_path = pathlib.Path("scripts/agents/manifest.toml")
          try:
              manifest = tomllib.loads(manifest_path.read_text())
          except tomllib.TOMLDecodeError as exc:
              sys.exit(f"ERROR: failed to parse {manifest_path}: {exc}")

          required_fields = {"version", "url", "sha256"}
          agents: dict = {}

          for agent, platforms in manifest.items():
              if not isinstance(platforms, dict):
                  sys.exit(
                      f"ERROR: invalid manifest structure for [{agent}]: "
                      "expected a table of platforms"
                  )
              for platform, arch_map in platforms.items():
                  if not isinstance(arch_map, dict):
                      sys.exit(
                          f"ERROR: invalid manifest structure for "
                          f"[{agent}.{platform}]: expected a table of architectures"
                      )
                  for arch, fields in arch_map.items():
                      if not isinstance(fields, dict):
                          sys.exit(
                              f"ERROR: invalid manifest structure for "
                              f"[{agent}.{platform}.{arch}]: expected a table"
                          )
                      missing = sorted(required_fields - fields.keys())
                      if missing:
                          sys.exit(
                              f"ERROR: manifest section [{agent}.{platform}.{arch}] "
                              f"is missing required keys: {', '.join(missing)}"
                          )
                      invalid = sorted(
                          k for k in required_fields if not isinstance(fields[k], str)
                      )
                      if invalid:
                          sys.exit(
                              f"ERROR: manifest section [{agent}.{platform}.{arch}] "
                              f"has non-string values for: {', '.join(invalid)}"
                          )
                      agents.setdefault(agent, {}).setdefault(platform, {})[arch] = {
                          "version": fields["version"],
                          "url": fields["url"],
                          "sha256": fields["sha256"],
                      }

          out = {"schema": 1, "agents": agents}
          pathlib.Path("RELEASE_DIGESTS.json").write_text(
              json.dumps(out, indent=2, sort_keys=True) + "\n"
          )
          print(json.dumps(out, indent=2, sort_keys=True))
          PY

      - name: Upload RELEASE_DIGESTS.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" RELEASE_DIGESTS.json --clobber
