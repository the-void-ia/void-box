name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

# claude-code version + sha256 are pinned in scripts/agents/manifest.toml
# (R-B5c.1). The build scripts read the manifest as the single source of
# truth; do not re-export CLAUDE_CODE_VERSION here.

jobs:
  # ── Linux builds (x86_64 + aarch64) ──────────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            nfpm_arch: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            nfpm_arch: arm64

    steps:
      - uses: actions/checkout@v4

      # Release builds run all the heavy steps in one job: cargo musl
      # cross-compile, initramfs build, kernel download/extract, plus
      # nfpm packaging. Reclaim ~28 GB of preinstalled SDKs so a future
      # kernel/image bump doesn't push past the runner's ~14 GB ceiling.
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true
          tool-cache: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-unknown-linux-musl

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools cpio gzip xz-utils zstd

      - name: Download static busybox
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              DEB_URL="https://launchpad.net/ubuntu/+archive/primary/+files/busybox-static_1.36.1-6ubuntu3.1_amd64.deb"
              ;;
            aarch64)
              DEB_URL="https://launchpad.net/ubuntu/+archive/primary/+files/busybox-static_1.36.1-6ubuntu3.1_arm64.deb"
              ;;
          esac
          curl -fsSL --retry 3 --retry-delay 5 "$DEB_URL" -o /tmp/busybox-static.deb
          cd /tmp && ar x busybox-static.deb && tar xf data.tar* ./usr/bin/busybox
          chmod +x /tmp/usr/bin/busybox

      - name: Build all artifacts
        run: |
          export BUSYBOX=/tmp/usr/bin/busybox
          export VOID_BOX_KMOD_VERSION=6.8.0-51
          export VOID_BOX_KMOD_UPLOAD=52
          ./scripts/build_release_artifacts.sh ${{ github.ref_name }} ${{ matrix.arch }}

      - name: Install nfpm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NFPM_VERSION=2.45.1
          NFPM_ARCH="${{ matrix.nfpm_arch }}"
          ASSET="nfpm_${NFPM_VERSION}_Linux_${NFPM_ARCH}.tar.gz"
          for attempt in 1 2 3 4 5; do
            if gh release download "v${NFPM_VERSION}" \
                 --repo goreleaser/nfpm \
                 --pattern "$ASSET" \
                 --output /tmp/nfpm.tar.gz; then
              break
            fi
            echo "nfpm download attempt $attempt failed; sleeping 15s"
            sleep 15
          done
          test -s /tmp/nfpm.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm

      - name: Build .deb package
        run: |
          VERSION="${VERSION#v}" ARCH="$ARCH" \
            nfpm package --packager deb --target target/release-artifacts/${{ github.ref_name }}/
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}

      - name: Build .rpm package
        run: |
          VERSION="${VERSION#v}" ARCH="$ARCH" \
            nfpm package --packager rpm --target target/release-artifacts/${{ github.ref_name }}/
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}

      - name: Verify .deb package
        if: matrix.arch == 'x86_64'
        run: |
          DEB_FILE=$(ls target/release-artifacts/${{ github.ref_name }}/voidbox_*.deb)
          sudo dpkg -i "$DEB_FILE"
          voidbox version
          test -f /usr/lib/voidbox/vmlinuz
          test -f /usr/lib/voidbox/initramfs.cpio.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: target/release-artifacts/${{ github.ref_name }}/*

  # ── macOS build (Apple Silicon) ──────────────────────────────────────────
  build-macos:
    name: Build macOS (aarch64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl cross-compiler
        run: |
          for attempt in 1 2 3 4 5; do
            if brew install messense/macos-cross-toolchains/aarch64-unknown-linux-musl; then
              break
            fi
            echo "brew install attempt $attempt failed; sleeping 30s"
            sleep 30
          done
          command -v aarch64-unknown-linux-musl-gcc

      - name: Build voidbox host binary
        run: |
          cargo build --release --bin voidbox

      - name: Build guest artifacts
        run: |
          export VOID_BOX_KMOD_VERSION=6.8.0-51
          export VOID_BOX_KMOD_UPLOAD=52
          OUT_CPIO=/tmp/rootfs.cpio.gz ARCH=aarch64 scripts/build_claude_rootfs.sh

      - name: Download kernel
        run: |
          ARCH=aarch64 scripts/download_kernel.sh

      - name: Stage and create tarball
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p dist
          cp target/release/voidbox dist/voidbox
          cp /tmp/rootfs.cpio.gz dist/initramfs.cpio.gz
          # macOS uses vmlinux (uncompressed) for Virtualization.framework
          cp target/vmlinux-arm64 dist/vmlinux

          # Sign macOS binary with virtualization entitlement so installed CLI can launch VMs.
          codesign --force --sign - --entitlements voidbox.entitlements dist/voidbox
          # Validate entitlement is embedded in the signed artifact.
          /usr/bin/codesign --display --entitlements /tmp/voidbox-release-entitlements.plist dist/voidbox
          grep -q "com.apple.security.virtualization" /tmp/voidbox-release-entitlements.plist

          mkdir -p target/release-artifacts/$VERSION
          tar -czf "target/release-artifacts/$VERSION/voidbox-${VERSION}-darwin-aarch64.tar.gz" \
            -C dist voidbox vmlinux initramfs.cpio.gz

          cd "target/release-artifacts/$VERSION"
          shasum -a 256 "voidbox-${VERSION}-darwin-aarch64.tar.gz" \
            > "checksums-${VERSION}-darwin-aarch64.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin-aarch64
          path: target/release-artifacts/${{ github.ref_name }}/*

  # ── Create GitHub Release ────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lhR release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          body: |
            ## void-box ${{ github.ref_name }}

            ### Install

            **Linux (deb):**
            ```bash
            curl -fsSLO https://github.com/the-void-ia/void-box/releases/download/${{ github.ref_name }}/voidbox_${{ github.ref_name }}_amd64.deb
            sudo dpkg -i voidbox_${{ github.ref_name }}_amd64.deb
            ```

            **Linux (rpm):**
            ```bash
            sudo rpm -i https://github.com/the-void-ia/void-box/releases/download/${{ github.ref_name }}/voidbox-${{ github.ref_name }}.x86_64.rpm
            ```

            **macOS (Homebrew):**
            ```bash
            brew tap the-void-ia/tap
            brew install voidbox
            ```

            **Shell installer (Linux & macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/the-void-ia/void-box/main/scripts/install.sh | sh
            ```

            **Manual download:**
            - Linux x86_64: `voidbox-${{ github.ref_name }}-linux-x86_64.tar.gz`
            - Linux aarch64: `voidbox-${{ github.ref_name }}-linux-aarch64.tar.gz`
            - macOS aarch64: `voidbox-${{ github.ref_name }}-darwin-aarch64.tar.gz`

            All packages bundle the `voidbox` binary, kernel, and initramfs — no env vars needed.

            See [Getting Started](https://github.com/the-void-ia/void-box#getting-started) for details.
          draft: false
          prerelease: false

  # ── Update Homebrew tap ──────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Compute sha256 of darwin tarball
        id: sha
        run: |
          TARBALL_URL="https://github.com/the-void-ia/void-box/releases/download/${{ github.ref_name }}/voidbox-${{ github.ref_name }}-darwin-aarch64.tar.gz"
          curl -fsSL "$TARBALL_URL" -o /tmp/darwin-tarball.tar.gz
          SHA256=$(sha256sum /tmp/darwin-tarball.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Darwin tarball SHA256: $SHA256"

      # Token scoped to the tap repo so the formula PR (below) is committed
      # with GitHub's signature — verified under the org ruleset. The App is
      # installed on the-void-ia/homebrew-tap with contents:write +
      # pull_requests:write, replacing the HOMEBREW_TAP_TOKEN PAT for both
      # checkout and the formula PR.
      - name: Generate GitHub App token (homebrew-tap)
        id: tap-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          owner: the-void-ia
          repositories: homebrew-tap

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: the-void-ia/homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_BARE="${VERSION#v}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          cat > homebrew-tap/Formula/voidbox.rb << RUBY
          class Voidbox < Formula
            desc "Composable workflow sandbox with micro-VMs and native observability"
            homepage "https://github.com/the-void-ia/void-box"
            url "https://github.com/the-void-ia/void-box/releases/download/${VERSION}/voidbox-${VERSION}-darwin-aarch64.tar.gz"
            sha256 "${SHA256}"
            license "Apache-2.0"
            version "${VERSION_BARE}"

            depends_on :macos

            def install
              bin.install "voidbox"
              (lib/"voidbox").install "vmlinux"
              (lib/"voidbox").install "initramfs.cpio.gz"

              # Virtualization.framework requires this entitlement on the running process.
              entitlements = buildpath/"voidbox.entitlements"
              entitlements.write <<~XML
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                  <key>com.apple.security.virtualization</key>
                  <true/>
                </dict>
                </plist>
              XML
              system "/usr/bin/codesign", "--force", "--sign", "-", "--entitlements", entitlements, bin/"voidbox"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/voidbox version")
              assert_predicate lib/"voidbox/vmlinux", :exist?
              assert_predicate lib/"voidbox/initramfs.cpio.gz", :exist?
            end
          end
          RUBY

      # The tap's default branch requires changes go through a PR (org
      # ruleset), so the formula bump can't be pushed directly. It is committed
      # to a short-lived branch via the GraphQL API (GitHub signs it), opened
      # as a PR, and squash-merged immediately — the tap requires zero
      # approving reviews, so this runs unattended, and the squash commit
      # GitHub writes onto the default branch is itself verified, satisfying
      # the signature + linear-history rules without any ruleset bypass.
      - name: Push formula update
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          repo="the-void-ia/homebrew-tap"

          # No-op guard: re-running an already-published tag leaves the
          # formula unchanged, so there is nothing to do.
          if git -C homebrew-tap diff --quiet -- Formula/voidbox.rb; then
            echo "Formula already at ${version}; nothing to push."
            exit 0
          fi

          # Resolve the tap's default branch rather than hard-coding main.
          base_branch="$(git -C homebrew-tap rev-parse --abbrev-ref HEAD)"
          base_sha="$(git -C homebrew-tap rev-parse HEAD)"
          head="automation/voidbox-${version}"

          # Create (or hard-reset) the formula branch at the tap's current tip.
          # A prior partial run may have left it behind. This branch is not the
          # default branch, so the org ruleset does not gate it.
          if ! gh api -X POST "repos/${repo}/git/refs" \
                -f ref="refs/heads/${head}" -f sha="${base_sha}" >/dev/null 2>&1; then
            echo "Branch ${head} already exists; resetting it to ${base_sha}"
            gh api -X PATCH "repos/${repo}/git/refs/heads/${head}" \
              -f sha="${base_sha}" -F force=true >/dev/null
          fi

          # Commit the formula onto that branch via createCommitOnBranch so the
          # commit is signed by GitHub. expectedHeadOid pins it to the tip we
          # just reset to.
          payload="$(mktemp)"
          REPO="$repo" BRANCH="$head" \
          HEADLINE="voidbox ${version}" \
          BASE_SHA="$base_sha" \
          CONTENTS="$(base64 -w0 homebrew-tap/Formula/voidbox.rb)" \
          python3 > "$payload" <<'PY'
          import json, os
          print(json.dumps({
              "query": (
                  "mutation($input: CreateCommitOnBranchInput!) {"
                  "  createCommitOnBranch(input: $input) { commit { oid } }"
                  "}"
              ),
              "variables": {"input": {
                  "branch": {
                      "repositoryNameWithOwner": os.environ["REPO"],
                      "branchName": os.environ["BRANCH"],
                  },
                  "message": {"headline": os.environ["HEADLINE"]},
                  "expectedHeadOid": os.environ["BASE_SHA"],
                  "fileChanges": {"additions": [{
                      "path": "Formula/voidbox.rb",
                      "contents": os.environ["CONTENTS"],
                  }]},
              }},
          }))
          PY

          resp="$(gh api graphql --input "$payload")"
          # GraphQL returns HTTP 200 even on error; inspect the errors array.
          oid="$(RESP="$resp" python3 <<'PY'
          import json, os, sys
          d = json.loads(os.environ["RESP"])
          if d.get("errors"):
              sys.stderr.write("createCommitOnBranch failed: "
                               + json.dumps(d["errors"]) + "\n")
              sys.exit(1)
          print(d["data"]["createCommitOnBranch"]["commit"]["oid"])
          PY
          )"
          echo "Committed ${oid} to ${repo}@${head}"

          # Open the PR (idempotent: a prior run may have opened it already).
          if ! gh pr view "$head" --repo "$repo" --json number >/dev/null 2>&1; then
            gh pr create --repo "$repo" \
              --base "$base_branch" --head "$head" \
              --title "voidbox ${version}" \
              --body "Automated Homebrew formula bump for voidbox ${version}."
          fi

          # Squash-merge → a single GitHub-signed commit on the default branch.
          # GitHub computes mergeability asynchronously after the PR is opened,
          # so retry briefly until it reports mergeable.
          merged=
          for attempt in 1 2 3 4 5 6; do
            if gh pr merge "$head" --repo "$repo" --squash --delete-branch; then
              merged=1
              break
            fi
            echo "merge attempt ${attempt} not ready; retrying in 5s..."
            sleep 5
          done
          if [[ -z "$merged" ]]; then
            echo "::error::failed to merge tap formula PR ${head}"
            exit 1
          fi
          echo "Merged ${head} into ${repo}@${base_branch}"
