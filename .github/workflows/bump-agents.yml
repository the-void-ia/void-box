name: Bump Agent Manifest

# R-B5c.1: weekly upstream poll for vendored agent binaries. For each agent
# (claude-code, codex), discover the latest upstream version and, for each
# arch whose manifest pin lags that version, download + hash the upstream
# artifact. If any arch moved, open one PR per agent containing only the
# arches that actually changed. A human reviews the version+hash pairs
# before merge.
#
# Per-arch independence: each arch is planned separately. If a prior PR was
# partial-merged, or a security patch only touched one arch, the manifest
# can legitimately hold different pins across arches — the next weekly run
# realigns the lagging arch without needing a human to hand-edit
# manifest.toml. If upstream temporarily lacks a build for one arch, the
# download fails and that arch is skipped-with-warning; the other arch
# still bumps.
#
# Batching policy: per-agent rather than per-(agent, platform, arch). In
# practice claude-code and codex ship their arches in lockstep, so a single
# PR per agent preserves the spec's branch-name pattern
# (`bump-agents/<agent>-<version>`) and keeps coupled arch bumps in one
# reviewable diff. Deviation from the spec's "not batched" clause is
# documented in docs/agents/{claude,codex}.md.
#
# The job does not merge; it only opens the PR.

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      agent:
        description: "Which agent to bump"
        required: false
        default: all
        type: choice
        options:
          - all
          - claude-code
          - codex

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover (${{ matrix.agent }})
    runs-on: ubuntu-latest
    # Matrix-level filter: when invoked via workflow_dispatch with
    # `inputs.agent` set, expand the matrix to just that agent so the
    # unwanted leg is never scheduled. Using a job-level `if` here would
    # fail validation — `matrix` is not in scope at job-level `if`. A
    # previous shape used a step-level `if` + `exit 0`, which only ended
    # the first step — every subsequent step (download, hash, open PR)
    # still ran for the non-selected agent and could open an unintended
    # PR. Filtering at the strategy level avoids both pitfalls.
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ (inputs.agent == '' || inputs.agent == 'all') && fromJSON('["claude-code", "codex"]') || fromJSON(format('["{0}"]', inputs.agent)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover latest upstream version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          case "${{ matrix.agent }}" in
            claude-code)
              # Anthropic's install.sh fetches this plain-text endpoint.
              latest="$(curl -fsSL https://downloads.claude.ai/claude-code-releases/latest)"
              ;;
            codex)
              # Latest codex release tag is `rust-v<version>`.
              latest_tag="$(gh release list \
                              --repo openai/codex \
                              --exclude-drafts \
                              --exclude-pre-releases \
                              --limit 20 \
                              --json tagName \
                              --jq '.[].tagName' \
                              | grep -E '^rust-v' \
                              | head -1)"
              latest="${latest_tag#rust-v}"
              ;;
          esac
          if [[ -z "$latest" ]]; then
            echo "ERROR: failed to discover latest version for ${{ matrix.agent }}" >&2
            exit 1
          fi
          echo "latest_version=$latest" >> "$GITHUB_OUTPUT"

      - name: Plan per-arch bumps
        id: plan
        env:
          AGENT: ${{ matrix.agent }}
          LATEST_VERSION: ${{ steps.latest.outputs.latest_version }}
        run: |
          set -euo pipefail
          source scripts/lib/agent_manifest.sh

          agent="$AGENT"
          latest="$LATEST_VERSION"
          plan_file="${RUNNER_TEMP:-/tmp}/bump-plan-${agent}.json"

          # Start with an empty plan — "has_bumps=true" only fires if at
          # least one arch successfully computed a new hash. All mutations
          # of the plan go through env-var-fed `python3 <<'PY'` heredocs
          # rather than `python3 -c "..."` so a future value containing a
          # quote cannot inject into the Python source.
          PLAN_FILE="$plan_file" AGENT="$agent" TARGET="$latest" python3 <<'PY'
          import json, os
          path = os.environ["PLAN_FILE"]
          with open(path, "w") as f:
              json.dump({
                  "agent": os.environ["AGENT"],
                  "target": os.environ["TARGET"],
                  "bumps": [],
              }, f)
          PY

          for arch in x86_64 aarch64; do
            entry="$(agent_manifest_require "$agent" linux "$arch")"
            pinned_version="$(printf '%s\n' "$entry" | sed -n '1p')"
            url_template="$(printf '%s\n' "$entry" | sed -n '2p')"

            if [[ "$pinned_version" == "$latest" ]]; then
              echo "[$agent:$arch] already pinned to $latest — skipping"
              continue
            fi

            url="${url_template//\{version\}/$latest}"
            tmp="$(mktemp)"
            # A failed download here is a skip-with-warning, not a job
            # failure: the other arch still gets a chance to bump, and
            # next Monday will retry the lagger. A *structural* surprise
            # (unexpected JSON shape from Anthropic) is treated separately
            # as a hard error below — we never want to silently degrade
            # cross-check coverage.
            echo "[$agent:$arch] fetching $url"
            if ! curl -fSL --retry 3 --retry-delay 5 -o "$tmp" "$url"; then
              echo "::warning::[$agent:$arch] upstream artifact not available at $url — skipping this arch"
              rm -f "$tmp"
              continue
            fi
            observed="$(sha256sum "$tmp" | awk '{print $1}')"
            rm -f "$tmp"

            if [[ "$agent" == "claude-code" ]]; then
              # Defense-in-depth for claude-code: Anthropic publishes a
              # manifest.json next to each release that lists per-platform
              # checksums. Cross-checking our GCS-bucket download against
              # that manifest catches CDN-edge tampering (two endpoints
              # served by the same origin disagreeing). It does NOT add an
              # independent oracle — both endpoints are operated by
              # Anthropic, so an upstream-account compromise would poison
              # both. Signature verification is the follow-up (see R-B5c.1
              # constraints / non-goals).
              case "$arch" in
                x86_64)  plat="linux-x64" ;;
                aarch64) plat="linux-arm64" ;;
              esac
              manifest_url="https://downloads.claude.ai/claude-code-releases/$latest/manifest.json"
              manifest_json="$(mktemp)"
              if ! curl -fsSL -o "$manifest_json" "$manifest_url"; then
                # Network failure is transient — retry next week.
                echo "::warning::[$agent:$arch] Anthropic manifest.json unavailable at $manifest_url — skipping this arch"
                rm -f "$manifest_json"
                continue
              fi

              # Structural failure (key renamed, schema change) is NOT
              # transient and must not silently degrade the cross-check.
              # The heredoc extractor exits with code 2 for a missing key;
              # we convert that to a hard job error, while exit 1 (generic)
              # or successful extraction follow their own paths.
              #
              # All inputs go through env vars: `python3 <<EOF arg` does
              # NOT pass `arg` as sys.argv[1] — it treats it as the script
              # filename and silently ignores the heredoc.
              set +e
              advertised="$(PLAT="$plat" MANIFEST_JSON="$manifest_json" python3 <<'PY'
          import json, os, sys
          d = json.load(open(os.environ["MANIFEST_JSON"]))
          try:
              print(d["platforms"][os.environ["PLAT"]]["checksum"])
          except KeyError as e:
              sys.stderr.write(f"missing key: {e!r}\n")
              sys.exit(2)
          PY
          )"
              rc=$?
              set -e
              rm -f "$manifest_json"

              if [[ "$rc" -eq 2 ]]; then
                echo "::error::[$agent:$arch] Anthropic manifest.json schema surprise for $plat at version $latest — structural key missing. Investigate before the next run; do not treat as transient."
                exit 1
              elif [[ "$rc" -ne 0 ]]; then
                echo "::warning::[$agent:$arch] manifest.json extraction failed (rc=$rc) — skipping this arch"
                continue
              fi
              if [[ "$advertised" != "$observed" ]]; then
                echo "::error::[$agent:$arch] Anthropic manifest.json checksum ($advertised) disagrees with GCS download ($observed)"
                exit 1
              fi
            fi

            # Append this arch to the plan.
            PLAN_FILE="$plan_file" ARCH="$arch" PREV="$pinned_version" \
              URL="$url" SHA="$observed" python3 <<'PY'
          import json, os
          path = os.environ["PLAN_FILE"]
          with open(path) as f:
              plan = json.load(f)
          plan["bumps"].append({
              "arch": os.environ["ARCH"],
              "prev": os.environ["PREV"],
              "url": os.environ["URL"],
              "sha256": os.environ["SHA"],
          })
          with open(path, "w") as f:
              json.dump(plan, f)
          PY
          done

          count="$(PLAN_FILE="$plan_file" python3 -c \
            'import json, os; print(len(json.load(open(os.environ["PLAN_FILE"]))["bumps"]))')"
          echo "plan_file=$plan_file" >> "$GITHUB_OUTPUT"
          if [[ "$count" -eq 0 ]]; then
            echo "has_bumps=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to do for $agent — every pinned arch already matches $latest."
          else
            echo "has_bumps=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch manifest.toml
        if: steps.plan.outputs.has_bumps == 'true'
        env:
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, pathlib, re
          plan = json.load(open(os.environ["PLAN_FILE"]))
          agent = plan["agent"]
          new_version = plan["target"]
          manifest = pathlib.Path("scripts/agents/manifest.toml")
          text = manifest.read_text()
          for bump in plan["bumps"]:
              arch = bump["arch"]
              sha = bump["sha256"]
              section = f"[{agent}.linux.{arch}]"
              pattern = re.compile(
                  re.escape(section) + r"\n((?:.*\n)*?)(?=\[|\Z)",
                  re.MULTILINE,
              )
              m = pattern.search(text)
              if not m:
                  raise SystemExit(f"section {section} not found")
              body = m.group(1)
              body = re.sub(
                  r'version\s*=\s*"[^"]*"',
                  f'version = "{new_version}"',
                  body,
              )
              body = re.sub(
                  r'sha256\s*=\s*"[^"]*"',
                  f'sha256 = "{sha}"',
                  body,
              )
              text = text[: m.start(1)] + body + text[m.end(1):]
          manifest.write_text(text)
          PY

      - name: Open PR
        if: steps.plan.outputs.has_bumps == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
        run: |
          set -euo pipefail
          agent="${{ matrix.agent }}"
          version="${{ steps.latest.outputs.latest_version }}"

          branch="bump-agents/${agent}-${version}"
          git config user.name "voidbox-bump-agents[bot]"
          git config user.email "voidbox-bump-agents@users.noreply.github.com"
          git checkout -b "$branch"
          git add scripts/agents/manifest.toml
          # `git diff --cached --quiet` exits 0 when there are no staged
          # changes. Corner case: a previous weekly run already bumped this
          # same (agent, version) pair *and the PR was merged*. The plan
          # short-circuit at `has_bumps` will almost always catch that
          # first, but a race — upstream advertises the new version,
          # prior PR merges in the same window — could still reach here
          # with nothing to commit. Exit cleanly rather than failing on an
          # empty `git commit`.
          if git diff --cached --quiet; then
            echo "[$agent] manifest already matches ${version} — prior PR already merged, nothing to push."
            exit 0
          fi
          git commit -m "chore(agents): bump ${agent} to ${version}"

          # Plain push for a fresh branch. If a previous run of this job
          # already opened a branch with the same name (e.g. the prior PR
          # was closed without merging), fall back to --force-with-lease
          # so we don't silently overwrite unrelated work. The shallow
          # checkout never fetched the bump branch, so a bare
          # --force-with-lease has no baseline to compare and fails with
          # "stale info"; fetch the remote ref first so the lease has
          # something concrete to expect.
          if ! git push origin "$branch"; then
            echo "Branch exists on remote; fetching it for --force-with-lease baseline"
            git fetch origin "$branch":"refs/remotes/origin/$branch"
            git push --force-with-lease="$branch:refs/remotes/origin/$branch" origin "$branch"
          fi

          body_file="$(mktemp)"
          python3 > "$body_file" <<'PY'
          import json, os
          plan = json.load(open(os.environ["PLAN_FILE"]))
          agent = plan["agent"]
          version = plan["target"]
          bumps = plan["bumps"]
          skipped = [a for a in ("x86_64", "aarch64")
                     if a not in {b["arch"] for b in bumps}]
          print(f"Automated bump for `{agent}` to version `{version}`.")
          print()
          print("| tuple | prev | url | sha256 (computed by CI) |")
          print("| --- | --- | --- | --- |")
          for b in bumps:
              print(f"| `linux/{b['arch']}` | `{b['prev']}` | {b['url']} | `{b['sha256']}` |")
          print()
          if skipped:
              print("Arches left unchanged this run:")
              for a in skipped:
                  print(f"- `linux/{a}` — either already pinned to `{version}` or upstream artifact was unavailable (see job log).")
              print()
          print("CI downloaded each artifact from the URL above and recorded the")
          print("SHA-256 shown here.")
          print()
          print("## How to verify the SHA-256s")
          print()
          if agent == "claude-code":
              print("CI cross-checks each download against Anthropic's `manifest.json`")
              print("(CDN-edge integrity — same origin, so not an independent oracle).")
              print("You can spot-check manually:")
              print()
              print("```bash")
              print(f"curl -fsSL https://downloads.claude.ai/claude-code-releases/{version}/manifest.json \\")
              print("  | jq '.platforms | {\"linux-x64\", \"linux-arm64\"} | map_values(.checksum)'")
              print("```")
              print()
              print("The `linux-x64` / `linux-arm64` checksums must match the")
              print("`linux/x86_64` / `linux/aarch64` rows above.")
          elif agent == "codex":
              print("Upstream publishes per-asset digests on the GitHub release page:")
              print(f"https://github.com/openai/codex/releases/tag/rust-v{version}")
              print()
              print("Spot-check from the CLI:")
              print()
              print("```bash")
              print(f"gh release view rust-v{version} --repo openai/codex --json assets \\")
              print("  --jq '.assets[] | select(.name | test(\"^codex-(x86_64|aarch64)-unknown-linux-musl\\\\.tar\\\\.gz$\")) | \"\\(.name) \\(.digest)\"'")
              print("```")
              print()
              print("Each printed `sha256:…` must match the row above for the corresponding arch.")
          print()
          print("## Why this needs a human")
          print()
          print("Once merged, the hashes above lock these binaries in place — every")
          print("future build aborts unless the download matches byte-for-byte. CI")
          print("just computed them from a single fetch against upstream, so merging")
          print("without spot-checking trusts whatever upstream served at that one")
          print("moment. The cross-check above is what catches a CDN-edge tamper or")
          print("an upstream-account compromise before it propagates into our")
          print("images. A surprise version jump (off-schedule, several releases at")
          print("once, pre-release tag) is its own signal worth a second look.")
          PY

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(agents): bump ${agent} to ${version}" \
            --body-file "$body_file"
