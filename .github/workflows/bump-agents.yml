name: Bump Agent Manifest

# R-B5c.1: weekly upstream poll for vendored agent binaries. Discovers the
# latest claude-code and codex versions, computes their SHA-256s for each
# arch, and opens one PR per agent that updates both arch tuples in one
# manifest diff. A human reviews the version+hash pairs before merge.
#
# Batching policy: per-agent rather than per-(agent, platform, arch). In
# practice claude-code and codex ship the same version across arches in
# lockstep, so a single PR per agent preserves the spec's branch-name
# pattern (`bump-agents/<agent>-<version>`) and avoids splitting work that
# must land together for the release pipeline to stay coherent. The PR body
# still surfaces the per-arch SHA-256s individually so review is granular.
#
# The job does not merge; it only opens the PR.

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      agent:
        description: "Limit to one agent (claude-code, codex, or empty for both)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover (${{ matrix.agent }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [claude-code, codex]
    steps:
      - name: Skip if input.agent narrows the matrix
        if: ${{ inputs.agent != '' && inputs.agent != matrix.agent }}
        run: |
          echo "skipping: input.agent=${{ inputs.agent }} != matrix.agent=${{ matrix.agent }}"
          exit 0

      - uses: actions/checkout@v4

      - name: Read current pinned versions
        id: pinned
        run: |
          set -euo pipefail
          source scripts/lib/agent_manifest.sh
          # Both arches should already pin to the same version; use x86_64
          # as the canonical reference and assert aarch64 matches.
          x86="$(agent_manifest_require "${{ matrix.agent }}" linux x86_64 | sed -n '1p')"
          arm="$(agent_manifest_require "${{ matrix.agent }}" linux aarch64 | sed -n '1p')"
          if [[ "$x86" != "$arm" ]]; then
            echo "ERROR: manifest has unequal versions for ${{ matrix.agent }} (x86_64=$x86 aarch64=$arm) — bump them to a common baseline manually before the weekly job can take over." >&2
            exit 1
          fi
          echo "pinned_version=$x86" >> "$GITHUB_OUTPUT"

      - name: Discover latest upstream version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          case "${{ matrix.agent }}" in
            claude-code)
              # Anthropic's install.sh fetches this plain-text endpoint.
              latest="$(curl -fsSL https://downloads.claude.ai/claude-code-releases/latest)"
              ;;
            codex)
              # Latest codex release tag is `rust-v<version>`.
              latest_tag="$(gh release list \
                              --repo openai/codex \
                              --exclude-drafts \
                              --exclude-pre-releases \
                              --limit 20 \
                              --json tagName \
                              --jq '.[].tagName' \
                              | grep -E '^rust-v' \
                              | head -1)"
              latest="${latest_tag#rust-v}"
              ;;
          esac
          if [[ -z "$latest" ]]; then
            echo "ERROR: failed to discover latest version for ${{ matrix.agent }}" >&2
            exit 1
          fi
          echo "latest_version=$latest" >> "$GITHUB_OUTPUT"

      - name: Short-circuit if up to date
        id: gate
        run: |
          if [[ "${{ steps.pinned.outputs.pinned_version }}" == "${{ steps.latest.outputs.latest_version }}" ]]; then
            echo "Already pinned to ${{ steps.latest.outputs.latest_version }} — no PR needed."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and hash each arch
        if: steps.gate.outputs.needs_bump == 'true'
        id: hash
        run: |
          set -euo pipefail
          source scripts/lib/agent_manifest.sh
          version="${{ steps.latest.outputs.latest_version }}"
          agent="${{ matrix.agent }}"

          # Accumulate per-arch hashes + URLs into env-passable vars.
          for arch in x86_64 aarch64; do
            entry="$(agent_manifest_require "$agent" linux "$arch")"
            url_template="$(printf '%s\n' "$entry" | sed -n '2p')"
            url="${url_template//\{version\}/$version}"
            tmp="$(mktemp)"
            echo "Fetching $url"
            curl -fSL --retry 3 --retry-delay 5 -o "$tmp" "$url"
            observed="$(sha256sum "$tmp" | awk '{print $1}')"
            rm -f "$tmp"

            if [[ "$agent" == "claude-code" ]]; then
              # Defense-in-depth for claude-code: Anthropic publishes a
              # manifest.json next to each release that lists per-platform
              # checksums. Cross-checking our GCS-bucket download against
              # that manifest catches CDN-edge tampering (two endpoints
              # served by the same origin disagreeing). It does NOT add an
              # independent oracle — both endpoints are operated by
              # Anthropic, so an upstream-account compromise would poison
              # both. Signature verification is the follow-up (see R-B5c.1
              # constraints / non-goals).
              case "$arch" in
                x86_64)  plat="linux-x64" ;;
                aarch64) plat="linux-arm64" ;;
              esac
              advertised="$(curl -fsSL \
                "https://downloads.claude.ai/claude-code-releases/$version/manifest.json" \
                | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['platforms']['$plat']['checksum'])")"
              if [[ "$advertised" != "$observed" ]]; then
                echo "ERROR: Anthropic manifest.json checksum ($advertised) disagrees with GCS download ($observed) for arch=$arch" >&2
                exit 1
              fi
            fi

            # Write arch-specific outputs for the next step.
            echo "${arch}_sha=$observed" >> "$GITHUB_OUTPUT"
            echo "${arch}_url=$url" >> "$GITHUB_OUTPUT"
          done

      - name: Patch manifest.toml (both arches in one diff)
        if: steps.gate.outputs.needs_bump == 'true'
        env:
          AGENT: ${{ matrix.agent }}
          NEW_VERSION: ${{ steps.latest.outputs.latest_version }}
          X86_SHA: ${{ steps.hash.outputs.x86_64_sha }}
          ARM_SHA: ${{ steps.hash.outputs.aarch64_sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, pathlib, re
          agent = os.environ["AGENT"]
          new_version = os.environ["NEW_VERSION"]
          per_arch_sha = {
              "x86_64": os.environ["X86_SHA"],
              "aarch64": os.environ["ARM_SHA"],
          }
          manifest = pathlib.Path("scripts/agents/manifest.toml")
          text = manifest.read_text()
          for arch, sha in per_arch_sha.items():
              section = f"[{agent}.linux.{arch}]"
              pattern = re.compile(
                  re.escape(section) + r"\n((?:.*\n)*?)(?=\[|\Z)",
                  re.MULTILINE,
              )
              m = pattern.search(text)
              if not m:
                  raise SystemExit(f"section {section} not found")
              body = m.group(1)
              body = re.sub(
                  r'version\s*=\s*"[^"]*"',
                  f'version = "{new_version}"',
                  body,
              )
              body = re.sub(
                  r'sha256\s*=\s*"[^"]*"',
                  f'sha256 = "{sha}"',
                  body,
              )
              text = text[: m.start(1)] + body + text[m.end(1):]
          manifest.write_text(text)
          PY

      - name: Open PR
        if: steps.gate.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          agent="${{ matrix.agent }}"
          version="${{ steps.latest.outputs.latest_version }}"
          prev="${{ steps.pinned.outputs.pinned_version }}"
          x86_sha="${{ steps.hash.outputs.x86_64_sha }}"
          arm_sha="${{ steps.hash.outputs.aarch64_sha }}"
          x86_url="${{ steps.hash.outputs.x86_64_url }}"
          arm_url="${{ steps.hash.outputs.aarch64_url }}"

          branch="bump-agents/${agent}-${version}"
          git config user.name "voidbox-bump-agents[bot]"
          git config user.email "voidbox-bump-agents@users.noreply.github.com"
          git checkout -b "$branch"
          git add scripts/agents/manifest.toml
          git commit -m "chore(agents): bump ${agent} ${prev} -> ${version}"

          # Plain push for a fresh branch. If a previous run of this job
          # already opened a branch with the same name (e.g. the prior PR
          # was closed without merging), fall back to --force-with-lease
          # so we don't silently overwrite unrelated work.
          if ! git push origin "$branch"; then
            echo "Branch exists on remote; retrying with --force-with-lease"
            git push --force-with-lease origin "$branch"
          fi

          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Automated R-B5c.1 bump for \`${agent}\`.

          | tuple | url | sha256 (computed by CI) |
          | --- | --- | --- |
          | \`linux/x86_64\` | ${x86_url} | \`${x86_sha}\` |
          | \`linux/aarch64\` | ${arm_url} | \`${arm_sha}\` |

          Previous pinned version: \`${prev}\`
          New version: \`${version}\`

          CI downloaded each artifact from the URL above and recorded the
          SHA-256 shown here. For claude-code, each SHA-256 was also
          cross-checked against Anthropic's advertised \`manifest.json\`
          (CDN-edge integrity; same origin, so not an independent oracle).

          Please review the version+hash combination before merging — that
          manual review is the human gate required by R-B5c.1.
          EOF

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(agents): bump ${agent} to ${version}" \
            --body-file "$body_file"
