name: Bump Agent Manifest

# R-B5c.1: weekly upstream poll for vendored agent binaries. For each agent
# (claude-code, codex), discover the latest upstream version and, for each
# arch whose manifest pin lags that version, download + hash the upstream
# artifact. If any arch moved, open one PR per agent containing only the
# arches that actually changed. A human reviews the version+hash pairs
# before merge.
#
# Per-arch independence: each arch is planned separately. If a prior PR was
# partial-merged, or a security patch only touched one arch, the manifest
# can legitimately hold different pins across arches — the next weekly run
# realigns the lagging arch without needing a human to hand-edit
# manifest.toml. If upstream temporarily lacks a build for one arch, the
# download fails and that arch is skipped-with-warning; the other arch
# still bumps.
#
# Batching policy: per-agent rather than per-(agent, platform, arch). In
# practice claude-code and codex ship their arches in lockstep, so a single
# PR per agent preserves the spec's branch-name pattern
# (`bump-agents/<agent>-<version>`) and keeps coupled arch bumps in one
# reviewable diff. Deviation from the spec's "not batched" clause is
# documented in docs/agents/{claude,codex}.md.
#
# The job does not merge; it only opens the PR.

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      agent:
        description: "Limit to one agent (claude-code, codex, or empty for both)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover (${{ matrix.agent }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [claude-code, codex]
    steps:
      - name: Skip if input.agent narrows the matrix
        if: ${{ inputs.agent != '' && inputs.agent != matrix.agent }}
        run: |
          echo "skipping: input.agent=${{ inputs.agent }} != matrix.agent=${{ matrix.agent }}"
          exit 0

      - uses: actions/checkout@v4

      - name: Discover latest upstream version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          case "${{ matrix.agent }}" in
            claude-code)
              # Anthropic's install.sh fetches this plain-text endpoint.
              latest="$(curl -fsSL https://downloads.claude.ai/claude-code-releases/latest)"
              ;;
            codex)
              # Latest codex release tag is `rust-v<version>`.
              latest_tag="$(gh release list \
                              --repo openai/codex \
                              --exclude-drafts \
                              --exclude-pre-releases \
                              --limit 20 \
                              --json tagName \
                              --jq '.[].tagName' \
                              | grep -E '^rust-v' \
                              | head -1)"
              latest="${latest_tag#rust-v}"
              ;;
          esac
          if [[ -z "$latest" ]]; then
            echo "ERROR: failed to discover latest version for ${{ matrix.agent }}" >&2
            exit 1
          fi
          echo "latest_version=$latest" >> "$GITHUB_OUTPUT"

      - name: Plan per-arch bumps
        id: plan
        env:
          AGENT: ${{ matrix.agent }}
          LATEST_VERSION: ${{ steps.latest.outputs.latest_version }}
        run: |
          set -euo pipefail
          source scripts/lib/agent_manifest.sh

          agent="$AGENT"
          latest="$LATEST_VERSION"
          plan_file="${RUNNER_TEMP:-/tmp}/bump-plan-${agent}.json"

          # Start with an empty plan — "has_bumps=true" only fires if at
          # least one arch successfully computed a new hash.
          python3 -c 'import json; print(json.dumps({"agent":"","target":"","bumps":[]}))' > "$plan_file"
          python3 -c "
          import json, os
          p = '$plan_file'
          with open(p) as f: d = json.load(f)
          d['agent'] = '$agent'
          d['target'] = '$latest'
          with open(p, 'w') as f: json.dump(d, f)
          "

          for arch in x86_64 aarch64; do
            entry="$(agent_manifest_require "$agent" linux "$arch")"
            pinned_version="$(printf '%s\n' "$entry" | sed -n '1p')"
            url_template="$(printf '%s\n' "$entry" | sed -n '2p')"

            if [[ "$pinned_version" == "$latest" ]]; then
              echo "[$agent:$arch] already pinned to $latest — skipping"
              continue
            fi

            url="${url_template//\{version\}/$latest}"
            tmp="$(mktemp)"
            # Any download or cross-check failure for this arch is a
            # skip-with-warning, not a job failure. The other arch still
            # gets a chance to bump, and next Monday will retry the lagger.
            echo "[$agent:$arch] fetching $url"
            if ! curl -fSL --retry 3 --retry-delay 5 -o "$tmp" "$url"; then
              echo "::warning::[$agent:$arch] upstream artifact not available at $url — skipping this arch"
              rm -f "$tmp"
              continue
            fi
            observed="$(sha256sum "$tmp" | awk '{print $1}')"
            rm -f "$tmp"

            if [[ "$agent" == "claude-code" ]]; then
              # Defense-in-depth for claude-code: Anthropic publishes a
              # manifest.json next to each release that lists per-platform
              # checksums. Cross-checking our GCS-bucket download against
              # that manifest catches CDN-edge tampering (two endpoints
              # served by the same origin disagreeing). It does NOT add an
              # independent oracle — both endpoints are operated by
              # Anthropic, so an upstream-account compromise would poison
              # both. Signature verification is the follow-up (see R-B5c.1
              # constraints / non-goals).
              case "$arch" in
                x86_64)  plat="linux-x64" ;;
                aarch64) plat="linux-arm64" ;;
              esac
              advertised="$(curl -fsSL \
                "https://downloads.claude.ai/claude-code-releases/$latest/manifest.json" \
                | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['platforms']['$plat']['checksum'])" || true)"
              if [[ -z "$advertised" ]]; then
                echo "::warning::[$agent:$arch] Anthropic manifest.json lacks a checksum for $plat at version $latest — skipping this arch"
                continue
              fi
              if [[ "$advertised" != "$observed" ]]; then
                echo "::error::[$agent:$arch] Anthropic manifest.json checksum ($advertised) disagrees with GCS download ($observed)"
                exit 1
              fi
            fi

            # Append this arch to the plan.
            python3 -c "
            import json
            p = '$plan_file'
            with open(p) as f: d = json.load(f)
            d['bumps'].append({
                'arch': '$arch',
                'prev': '$pinned_version',
                'url': '$url',
                'sha256': '$observed',
            })
            with open(p, 'w') as f: json.dump(d, f)
            "
          done

          count="$(python3 -c "import json; print(len(json.load(open('$plan_file'))['bumps']))")"
          echo "plan_file=$plan_file" >> "$GITHUB_OUTPUT"
          if [[ "$count" -eq 0 ]]; then
            echo "has_bumps=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to do for $agent — every pinned arch already matches $latest."
          else
            echo "has_bumps=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch manifest.toml
        if: steps.plan.outputs.has_bumps == 'true'
        env:
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, pathlib, re
          plan = json.load(open(os.environ["PLAN_FILE"]))
          agent = plan["agent"]
          new_version = plan["target"]
          manifest = pathlib.Path("scripts/agents/manifest.toml")
          text = manifest.read_text()
          for bump in plan["bumps"]:
              arch = bump["arch"]
              sha = bump["sha256"]
              section = f"[{agent}.linux.{arch}]"
              pattern = re.compile(
                  re.escape(section) + r"\n((?:.*\n)*?)(?=\[|\Z)",
                  re.MULTILINE,
              )
              m = pattern.search(text)
              if not m:
                  raise SystemExit(f"section {section} not found")
              body = m.group(1)
              body = re.sub(
                  r'version\s*=\s*"[^"]*"',
                  f'version = "{new_version}"',
                  body,
              )
              body = re.sub(
                  r'sha256\s*=\s*"[^"]*"',
                  f'sha256 = "{sha}"',
                  body,
              )
              text = text[: m.start(1)] + body + text[m.end(1):]
          manifest.write_text(text)
          PY

      - name: Open PR
        if: steps.plan.outputs.has_bumps == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
        run: |
          set -euo pipefail
          agent="${{ matrix.agent }}"
          version="${{ steps.latest.outputs.latest_version }}"

          branch="bump-agents/${agent}-${version}"
          git config user.name "voidbox-bump-agents[bot]"
          git config user.email "voidbox-bump-agents@users.noreply.github.com"
          git checkout -b "$branch"
          git add scripts/agents/manifest.toml
          git commit -m "chore(agents): bump ${agent} to ${version}"

          # Plain push for a fresh branch. If a previous run of this job
          # already opened a branch with the same name (e.g. the prior PR
          # was closed without merging), fall back to --force-with-lease
          # so we don't silently overwrite unrelated work.
          if ! git push origin "$branch"; then
            echo "Branch exists on remote; retrying with --force-with-lease"
            git push --force-with-lease origin "$branch"
          fi

          body_file="$(mktemp)"
          python3 > "$body_file" <<'PY'
          import json, os
          plan = json.load(open(os.environ["PLAN_FILE"]))
          agent = plan["agent"]
          version = plan["target"]
          bumps = plan["bumps"]
          skipped = [a for a in ("x86_64", "aarch64")
                     if a not in {b["arch"] for b in bumps}]
          print(f"Automated R-B5c.1 bump for `{agent}` to version `{version}`.")
          print()
          print("| tuple | prev | url | sha256 (computed by CI) |")
          print("| --- | --- | --- | --- |")
          for b in bumps:
              print(f"| `linux/{b['arch']}` | `{b['prev']}` | {b['url']} | `{b['sha256']}` |")
          print()
          if skipped:
              print("Arches left unchanged this run:")
              for a in skipped:
                  print(f"- `linux/{a}` — either already pinned to `{version}` or upstream artifact was unavailable (see job log).")
              print()
          print("CI downloaded each artifact from the URL above and recorded the")
          print("SHA-256 shown here. For claude-code, each SHA-256 was also")
          print("cross-checked against Anthropic's advertised `manifest.json`")
          print("(CDN-edge integrity; same origin, so not an independent oracle).")
          print()
          print("Please review the version+hash combination before merging — that")
          print("manual review is the human gate required by R-B5c.1.")
          PY

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(agents): bump ${agent} to ${version}" \
            --body-file "$body_file"
