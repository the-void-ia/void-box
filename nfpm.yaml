# nfpm configuration for void-box Linux packages (.deb + .rpm)
# https://nfpm.goreleaser.com/configuration/
#
# Build packages:
#   VERSION=0.1.2 ARCH=x86_64 nfpm package --packager deb --target dist/
#   VERSION=0.1.2 ARCH=x86_64 nfpm package --packager rpm --target dist/
#
# Environment variables:
#   VERSION  — package version (e.g. 0.1.1), required
#   ARCH     — target architecture (x86_64 or aarch64), required

name: voidbox
arch: "${ARCH}"
version: "${VERSION}"
maintainer: "Diego Parra <diegolparra@gmail.com>"
description: "Composable workflow sandbox with KVM micro-VMs and native observability"
homepage: "https://github.com/the-void-ia/void-box"
license: "Apache-2.0"
vendor: "the-void-ia"
section: "devel"

contents:
  # Binary
  - src: dist/voidbox
    dst: /usr/bin/voidbox
    file_info:
      mode: 0755

  # Kernel + initramfs
  - src: dist/vmlinuz
    dst: /usr/lib/voidbox/vmlinuz
    file_info:
      mode: 0644

  - src: dist/initramfs.cpio.gz
    dst: /usr/lib/voidbox/initramfs.cpio.gz
    file_info:
      mode: 0644

  # FHS directories (created empty by the package)
  - dst: /etc/voidbox
    type: dir
    file_info:
      mode: 0755

  - dst: /var/lib/voidbox
    type: dir
    file_info:
      mode: 0755

  - dst: /var/log/voidbox
    type: dir
    file_info:
      mode: 0755

  - dst: /usr/share/voidbox
    type: dir
    file_info:
      mode: 0755

  # Optional ASCII logo for TUI (packaged from assets/ if present)
  # Uncomment when assets/logo/void-box.txt exists:
  # - src: assets/logo/void-box.txt
  #   dst: /usr/share/voidbox/logo.txt
  #   file_info:
  #     mode: 0644

overrides:
  deb:
    recommends:
      - busybox-static
  rpm:
    recommends:
      - busybox
